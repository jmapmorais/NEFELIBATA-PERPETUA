<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEFELIBATA PERPETUA</title>
    <style>
        :root {
            /* Path logic: M 0,0 (start center) m -R, 0 (move left by Radius)
               a R,R 0 1,0 2R,0 (draw bottom half arc)
               a R,R 0 1,0 -2R,0 (draw top half arc)
            */
            
            /* Inner Circle (Radius: 210) */
            --path-inner: path("M 0,0 m -210, 0 a 210,210 0 1,0 420,0 a 210,210 0 1,0 -420,0");
            --speed-inner: 35s;

            /* Outer Circle (Radius: 280) */
            --path-outer: path("M 0,0 m -280, 0 a 280,280 0 1,0 560,0 a 280,280 0 1,0 -560,0");
            --speed-outer: 45s; /* Slightly slower for the larger circumference */
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: #ffffff;
            font-family: 'Helvetica', 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        .logo {
            position: relative;
            width: 250px;
            height: 250px;
            z-index: 10;
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        .logo img {
            max-width: 100%;
            height: auto;
        }

        /* Base styles for all letters */
        .char {
            position: absolute;
            top: 50%;
            left: 50%;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #333;
            white-space: nowrap;
            offset-rotate: 0deg; 
        }

        /* Specific styles for the inner ring */
        .ring-inner {
            offset-path: var(--path-inner);
            animation: move var(--speed-inner) linear infinite;
        }

        /* Specific styles for the outer ring */
        .ring-outer {
            offset-path: var(--path-outer);
            animation: move var(--speed-outer) linear infinite;
        }

        @keyframes move {
            0% { offset-distance: 100%; }
            100% { offset-distance: 0%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <img src="assets/LOGO-crop_NEFELIBATA.png" alt="Logo">
    </div>
    
    <div id="slogan-inner-container"></div>
    <div id="slogan-outer-container"></div>
</div>

<script>
    const slogan = "nefelibata is a multi-disciplinar curated archive of works by an orbital network of individuals ❊ open-access space of autonomy-freedom • ";
    
    const reversedLetters = slogan.split('').reverse();
    const totalChars = reversedLetters.length;

    // A reusable function to generate the spans for a specific ring
    function buildTextRing(containerId, ringClass, speedVariable) {
        const container = document.getElementById(containerId);
        
        reversedLetters.forEach((char, i) => {
            const span = document.createElement('span');
            // Apply both the base character class and the specific ring class
            span.className = `char ${ringClass}`;
            span.innerText = char === " " ? "\u00A0" : char;
            
            // CSS 'var()' works natively inside 'calc()', keeping the JS extremely clean
            span.style.animationDelay = `calc((${i} / ${totalChars}) * -1 * var(${speedVariable}))`;
            
            container.appendChild(span);
        });
    }

    // Build the inner ring
    buildTextRing('slogan-inner-container', 'ring-inner', '--speed-inner');
    
    // Build the outer ring
    buildTextRing('slogan-outer-container', 'ring-outer', '--speed-outer');

</script>

</body>
</html>
