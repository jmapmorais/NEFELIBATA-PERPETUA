<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEFELIBATA EPHEMERA - SummerSolstice 2026</title>
    <style>
        :root {
            --speed-1: 30s;
            --speed-2: 40s;
            --speed-3: 50s;
            --speed-4: 60s;
            --speed-5: 70s;
            --speed-6: 80s;
            --speed-7: 90s;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: #ffffff;
            font-family: 'Helvetica', 'Arial', sans-serif;
            overflow: hidden;
        }

        /* --- Corner Text Styling --- */
        .corner-text {
            position: absolute;
            font-weight: 600;
            color: #333;
            letter-spacing: 1px;
            z-index: 20; /* Ensures the text sits above the rings */
            text-transform: uppercase;
            
            /* Responsive sizing: scales smoothly between 14px on mobile and 24px on large screens */
            font-size: clamp(8px, 2vw, 14px); 
            margin: clamp(15px, 4vw, 30px);
        }

        /* Specific positions for each corner */
        .top-left { top: 0; left: 0; }
        .top-right { top: 0; right: 0; }
        .bottom-left { bottom: 0; left: 0; }
        .bottom-right { bottom: 0; right: 0; }

        .container {
            position: relative;
            display: flex; 
            justify-content: center; 
            align-items: center;
            transform: scale(0.85); 
            transition: transform 0.2s ease-out; 
        }

        /* --- Center Logo Styling --- */
        .center-logo {
            position: absolute;
            width: 220px;
            height: auto;
            z-index: 10;
        }

        /* --- Ring Styling --- */
        .ring {
            position: absolute;
            width: 0;
            height: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            will-change: transform; 
        }

        .ring-1 { animation: spin var(--speed-1) linear infinite; }
        .ring-2 { animation: spin var(--speed-2) linear infinite; }
        .ring-3 { animation: spin var(--speed-3) linear infinite; }
        .ring-4 { animation: spin var(--speed-4) linear infinite; }
        .ring-5 { animation: spin var(--speed-5) linear infinite; }
        .ring-6 { animation: spin var(--speed-6) linear infinite; }
        .ring-7 { animation: spin var(--speed-7) linear infinite; }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
        }

        .char {
            position: absolute;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #333;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="corner-text top-left">from 11h</div>
<div class="corner-text top-right">summer solstice</div>
<div class="corner-text bottom-left">21 june 2026</div>
<div class="corner-text bottom-right">to 23h</div>

<div class="container">
    
    <svg class="center-logo" viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
        <path id="curve-bottom" d="M 50,227 Q 250,347 450,227" fill="transparent" />
        <path id="curve-nefelibata" d="M 50,227 Q 250,347 450,227" fill="transparent">
            <animate 
                attributeName="d" 
                dur="32.5s" 
                repeatCount="indefinite"
                values="
                    M 50,227 Q 250,347 450,227; 
                    M 50,227 Q 250,347 450,227; 
                    M 50,227 Q 250,107 450,227; 
                    M 50,227 Q 250,107 450,227; 
                    M 50,227 Q 250,347 450,227; 
                    M 50,227 Q 250,107 450,227; 
                    M 50,227 Q 250,107 450,227; 
                    M 50,227 Q 250,347 450,227;
                    M 50,227 Q 250,107 450,227;
                    M 50,227 Q 250,107 450,227;
                    M 50,227 Q 250,347 450,227
                "
                keyTimes="0; 0.0923; 0.1231; 0.5846; 0.5923; 0.6000; 0.6308; 0.6385; 0.6462; 0.9538; 1"
                calcMode="spline"
                keySplines="
                    0 0 1 1; 
                    0.42 0 0.58 1; 
                    0 0 1 1; 
                    0.42 0 0.58 1; 
                    0.42 0 0.58 1; 
                    0 0 1 1; 
                    0.42 0 0.58 1;
                    0.42 0 0.58 1;
                    0 0 1 1;
                    0.42 0 0.58 1
                " 
            />
        </path>
        <g font-family="'Helvetica', 'Arial', sans-serif" font-size="54px" font-weight="600" fill="#333" letter-spacing="1">
            <text opacity="0">
                <animate 
                    attributeName="opacity" 
                    dur="32.5s" 
                    repeatCount="indefinite"
                    values="0; 0; 1; 1; 0; 1; 1; 0; 1; 1; 0"
                    keyTimes="0; 0.0923; 0.1231; 0.5846; 0.5923; 0.6000; 0.6308; 0.6385; 0.6462; 0.9538; 1"
                    calcMode="spline"
                    keySplines="
                        0 0 1 1; 
                        0.42 0 0.58 1; 
                        0 0 1 1; 
                        0.42 0 0.58 1; 
                        0.42 0 0.58 1; 
                        0 0 1 1; 
                        0.42 0 0.58 1;
                        0.42 0 0.58 1;
                        0 0 1 1;
                        0.42 0 0.58 1
                    " 
                />
                <textPath href="#curve-bottom" startOffset="50%" text-anchor="middle">EPHEMERA</textPath>
            </text>
            <text>
                <textPath href="#curve-nefelibata" startOffset="50%" text-anchor="middle">NEFELIBATA</textPath>
            </text>
        </g>
    </svg>

    <div id="ring-container-1" class="ring ring-1"></div>
    <div id="ring-container-2" class="ring ring-2"></div>
    <div id="ring-container-3" class="ring ring-3"></div>
    <div id="ring-container-4" class="ring ring-4"></div>
    <div id="ring-container-5" class="ring ring-5"></div>
    <div id="ring-container-6" class="ring ring-6"></div>
    <div id="ring-container-7" class="ring ring-7"></div>
</div>

<script>
    const ringTexts = [
        " ❊ Joao Morais ❊               ",
        " ❊ fidelcastrocompanhiadesamba ❊           ",
        " ❊ Gas Cohen ❊                                   ",
        " ❊ Gui Silvestre ❊                                             ",
        " ❊ AMA+HS ❊                                                                                                           ",
        " ❊ MUSIC FOR TOMBAK & SYNTH by Cinna Peyghamy <<< album listening session >>> ❊              ",
        " ❊ Clarisse Pinto: SAD GIRL RADIO SHOW ❊                                                                   "
    ];

    const radii = [150, 200, 250, 300, 350, 400, 450];

    function buildTextRing(containerId, text, radius) {
        const container = document.getElementById(containerId);
        
        const chars = text.split('');
        const totalChars = chars.length;
        const angleIncrement = 360 / totalChars;
        
        chars.forEach((char, i) => {
            const span = document.createElement('span');
            span.className = 'char';
            span.innerHTML = char === " " ? "&nbsp;" : char;
            
            const angle = i * angleIncrement;
            
            span.style.transform = `rotate(${angle}deg) translateY(-${radius}px)`;
            
            container.appendChild(span);
        });
    }

    for (let i = 1; i <= 7; i++) {
        buildTextRing(`ring-container-${i}`, ringTexts[i - 1], radii[i - 1]);
    }

    function adjustScale() {
        const container = document.querySelector('.container');
        const screenWidth = window.innerWidth;
        const mobileScale = screenWidth / 630;
        const finalScale = Math.min(0.85, mobileScale);
        container.style.transform = `scale(${finalScale})`;
    }

    adjustScale();
    window.addEventListener('resize', adjustScale);

</script>

</body>
</html>
