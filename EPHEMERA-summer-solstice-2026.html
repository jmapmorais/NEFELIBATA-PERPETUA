<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEFELIBATA PERPETUA</title>
    <style>
        :root {
            --speed-1: 30s;
            --speed-2: 40s;
            --speed-3: 50s;
            --speed-4: 60s;
            --speed-5: 70s;
            --speed-6: 80s;
            --speed-7: 90s;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: #ffffff;
            font-family: 'Helvetica', 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            display: flex; 
            justify-content: center; 
            align-items: center;
            transform: scale(0.85); 
        }

        .ring {
            position: absolute;
            width: 0;
            height: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            will-change: transform; 
        }

        /* All rings now use the exact same forward animation */
        .ring-1 { animation: spin var(--speed-1) linear infinite; }
        .ring-2 { animation: spin var(--speed-2) linear infinite; }
        .ring-3 { animation: spin var(--speed-3) linear infinite; }
        .ring-4 { animation: spin var(--speed-4) linear infinite; }
        .ring-5 { animation: spin var(--speed-5) linear infinite; }
        .ring-6 { animation: spin var(--speed-6) linear infinite; }
        .ring-7 { animation: spin var(--speed-7) linear infinite; }

        /* The keyframes dictate the counter-clockwise direction (-360deg) */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
        }

        .char {
            position: absolute;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #333;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="ring-container-1" class="ring ring-1"></div>
    <div id="ring-container-2" class="ring ring-2"></div>
    <div id="ring-container-3" class="ring ring-3"></div>
    <div id="ring-container-4" class="ring ring-4"></div>
    <div id="ring-container-5" class="ring ring-5"></div>
    <div id="ring-container-6" class="ring ring-6"></div>
    <div id="ring-container-7" class="ring ring-7"></div>
</div>

<script>
    const ringTexts = [
        " ❊ Joao Morais ❊               ",
        " ❊ Francisco Amorim ❊                  ",
        " ❊ Gaspar Cohen ❊                                  ",
        " ❊ Gui Silvestre ❊                                             ",
        " ❊ AMA+HS ❊                                                                                                           ",
        " ❊ MUSIC FOR TOMBAK & SYNTH by Cinna Peyghamy <<< album listening session >>> ❊              ",
        " ❊ Clarisse Pinto's SAD GIRL RADIO SHOW ❊                                                                   "
    ];

    const radii = [150, 200, 250, 300, 350, 400, 450];

    function buildTextRing(containerId, text, radius) {
        const container = document.getElementById(containerId);
        
        const chars = text.split('');
        const totalChars = chars.length;
        const angleIncrement = 360 / totalChars;
        
        chars.forEach((char, i) => {
            const span = document.createElement('span');
            span.className = 'char';
            span.innerHTML = char === " " ? "&nbsp;" : char;
            
            const angle = i * angleIncrement;
            
            span.style.transform = `rotate(${angle}deg) translateY(-${radius}px)`;
            
            container.appendChild(span);
        });
    }

    for (let i = 1; i <= 7; i++) {
        buildTextRing(`ring-container-${i}`, ringTexts[i - 1], radii[i - 1]);
    }
</script>

</body>
</html>
